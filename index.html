<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Music Library</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:linear-gradient(-45deg,#0f172a,#1e293b,#111827,#312e81);
    background-size:400% 400%;
    animation:bgMove 15s ease infinite;
    color:white;
    overflow-x:hidden;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

header{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

header h1{
    font-size:65px;
    margin-bottom:15px;
}

header p{
    font-size:20px;
    opacity:.8;
}

section{
    padding:70px 10%;
}

.music-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:35px;
}

.card{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(18px);
    border-radius:22px;
    padding:25px;
    transition:.5s;
    border:1px solid rgba(255,255,255,.15);

    opacity:0;
    transform:translateY(60px);
}

.card.show{
    opacity:1;
    transform:translateY(0);
}

.card:hover{
    transform:translateY(-10px) scale(1.02);
    box-shadow:0 20px 40px rgba(0,0,0,.45);
}

.album{
    width:100%;
    height:220px;
    border-radius:18px;
    background:linear-gradient(135deg,#6366f1,#8b5cf6,#06b6d4);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:80px;
    margin-bottom:20px;
}

h2{
    margin-bottom:12px;
}

.artist{
    color:#d1d5db;
    margin-bottom:20px;
}

audio{
    width:100%;
}

footer{
    text-align:center;
    padding:60px;
    color:#ccc;
}

/* Smooth Fade-In Animation */

.reveal{
    opacity:0;
    transform:translateY(50px);
    transition:all .8s ease;
}

.reveal.active{
    opacity:1;
    transform:translateY(0);
}
</style>
</head>

<body>

<header>

<h1>🎵 My Music</h1>

<p>Relax. Listen. Enjoy.</p>

</header>

<section>

<div class="music-grid">

<div class="card reveal">

<div class="album">🎧</div>

<h2>Gangsta Grandma</h2>

<div class="artist">Artist Name</div>

<audio controls>
<source src="music/Grandma_Gangsta.m4a" type="audio/mp4">
</audio>

</div>

<div class="card reveal">

<div class="album">🎼</div>

<h2>Another Song</h2>

<div class="artist">Artist Name</div>

<audio controls>
<source src="music/song2.mp3" type="audio/mpeg">
</audio>


<div class="card reveal">

<div class="album">🎹</div>

<h2>Third Song</h2>

<div class="artist">Artist Name</div>

<audio controls>
<source src="music/song3.mp3" type="audio/mpeg">
</audio>

</div>

</div>

</section>

<footer>

Made with ❤️

</footer>

<script>

const reveals=document.querySelectorAll(".reveal");

const observer=new IntersectionObserver(entries=>{

entries.forEach(entry=>{

if(entry.isIntersecting){
entry.target.classList.add("active");
}

});

},{threshold:0.2});

reveals.forEach(el=>observer.observe(el));

</script>

</body>
</html>
